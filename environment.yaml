name: ezgatr
channels:
  - conda-forge
dependencies:
  - python=3.10
  - cxx-compiler
  - cmake
  - ninja
  - pip
  - pip:
      # PyTorch CPU wheels; fall back to PyPI for everything else.
      - --index-url https://download.pytorch.org/whl/cpu
      - --extra-index-url https://pypi.org/simple

      # Runtime (matches pyproject.toml [project].dependencies)
      - torch==2.4.0+cpu
      - einops==0.8.2

      # C++ extension tooling
      - pybind11==3.0.4

      # Dev group (poetry [tool.poetry.group.dev.dependencies])
      - pytest==8.4.2
      - hypothesis==6.152.2
      - pre-commit==3.8.0
      - ruff==0.6.9
      - ipykernel==6.31.0
      - ipywidgets==8.1.8
      - bpython==0.24
      - pytest-cov==5.0.0
      - coverage[toml]==7.13.5
      - mypy==1.20.2
      - numba==0.58.1
      - clifford==1.5.1
      - toml==0.10.2

      # Docs group (poetry [tool.poetry.group.docs.dependencies])
      - pdoc==14.7.0

      # The project itself (editable from this checkout)
      - -e .
